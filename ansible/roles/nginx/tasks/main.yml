---
- name: Zainstaluj nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Skopiuj konfigurację
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Upewnij się, że nginx działa i startuje z systemem
  service:
    name: nginx
    state: started
    enabled: yes